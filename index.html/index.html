<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Автоинструктор — обучение вождению</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Частный автоинструктор</h1>
    <p>Обучение вождению с нуля и повышение навыков</p>
    <button id="signupBtn">Записаться на занятие</button>
  </header>

  <main>
    <section>
      <h2>Услуги</h2>
      <ul>
        <li>Обучение с нуля</li>
        <li>Подготовка к экзамену</li>
        <li>Восстановление навыков</li>
      </ul>
    </section>

    <section>
      <h2>Обо мне</h2>
      <p>Опытный автоинструктор с большим стажем обучения.</p>
    </section>

    <section>
      <h2>Контакты</h2>
      <p>Телефон: +7 (___) ___-__-__</p>
   
    </section>
  <section id="signup">
  <h2>Записаться на занятие</h2>
  <form id="signupForm">
    <input type="text" id="name" placeholder="Ваше имя" required>
    <input type="tel" id="phone" placeholder="Телефон" required>
    <button type="submit">Отправить заявку</button>
  </form>
  <p id="message"></p>
</section>
  </main>

  <footer>
    <p>© 2026 Автоинструктор</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
